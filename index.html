<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Binary Live Interpretor Installation Website</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: monospace;
    color: #00ff88;
}

/* MATRIX BACKGROUND */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
    opacity: 0.15;
}

/* CENTER PANEL */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

.panel {
    border: 1px solid #00ff88;
    padding: 25px;
    background: rgba(0,0,0,0.75);
    box-shadow: 0 0 30px rgba(0,255,136,0.1);
    width: 320px;
}

h1 {
    font-size: 18px;
    font-weight: normal;
    letter-spacing: 2px;
    margin-bottom: 20px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: 1px solid #00ff88;
    background: transparent;
    color: #00ff88;
    cursor: pointer;
    transition: 0.2s;
    font-size: 14px;
}

button:hover {
    background: #00ff88;
    color: black;
    box-shadow: 0 0 20px #00ff88;
}

.small {
    margin-top: 10px;
    font-size: 11px;
    opacity: 0.7;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
<div class="panel">

<h1>INSTALL BLI</h1>

<button onclick="install()">INSTALL NOW</button>

<div class="small">
Secure node installer interface
</div>

</div>
</div>

<script>

/* MATRIX EFFECT */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#00ff88";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}
setInterval(draw, 40);

/* BUTTON ACTION */
function install() {
    window.location.href =
    "https://github.com/bli-website/app123/raw/refs/heads/main/BLI-compressed.zip";
}

</script>

</body>
</html>
